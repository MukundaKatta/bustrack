name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint / typecheck / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm --filter @bustrack/web build
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          NEXTAUTH_SECRET: ci-build-only-not-a-real-secret
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_MAPBOX_TOKEN: pk.ci-dummy
